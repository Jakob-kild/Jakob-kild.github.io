<!DOCTYPE html>
<html>
<head>
    
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    
<style>
  .sensor-dot {
    width: 15px;
    height: 15px;
    border-radius: 999px;
    background: linear-gradient(135deg, #60a5fa, #2563eb);
    border: 2px solid #ffffff;
    box-shadow:
      0 2px 8px rgba(37, 99, 235, 0.35),
      0 0 0 3px rgba(37, 99, 235, 0.16);
  }

  .sensor-dot.researched {
    width: 18px;
    height: 18px;
    background: linear-gradient(135deg, #93c5fd, #1d4ed8);
    box-shadow:
      0 3px 10px rgba(29, 78, 216, 0.42),
      0 0 0 4px rgba(37, 99, 235, 0.18);
  }

  .venue-pin {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 50% 50% 50% 9px;
    background: linear-gradient(135deg, #fed7aa 0%, #fb923c 42%, #c2410c 100%);
    border: 2px solid #ffffff;
    box-shadow:
      0 4px 14px rgba(194, 65, 12, 0.38),
      0 0 0 4px rgba(249, 115, 22, 0.18);
    transform: rotate(-45deg);
  }

  .venue-pin span {
    transform: rotate(45deg);
    font-size: 15px;
    line-height: 1;
  }

  .venue-pin.featured {
    animation: venuePulse 1.8s ease-in-out infinite;
    box-shadow:
      0 5px 18px rgba(194, 65, 12, 0.48),
      0 0 0 5px rgba(251, 191, 36, 0.26);
  }

  @keyframes venuePulse {
    0%, 100% {
      transform: rotate(-45deg) scale(1);
    }
    50% {
      transform: rotate(-45deg) scale(1.08);
    }
  }

  .leaflet-popup-content-wrapper {
    border-radius: 18px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 18px 45px rgba(15, 23, 42, 0.24);
  }

  .leaflet-popup-content {
    margin: 0;
    width: 340px !important;
  }

  .map-popup {
    font-family: Inter, Arial, sans-serif;
    color: #1f2937;
    background: #ffffff;
  }

  .popup-header {
    padding: 16px 18px 15px;
    color: white;
  }

  .sensor-header {
    background:
      radial-gradient(circle at 90% 10%, rgba(147, 197, 253, 0.55), transparent 34%),
      linear-gradient(135deg, #1d4ed8, #2563eb);
  }

  .venue-header {
    background:
      radial-gradient(circle at 90% 10%, rgba(254, 215, 170, 0.65), transparent 34%),
      linear-gradient(135deg, #c2410c, #f97316);
  }

  .popup-kicker {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.82;
    margin-bottom: 4px;
  }

  .popup-title {
    font-family: Syne, Inter, Arial, sans-serif;
    font-size: 19px;
    line-height: 1.1;
    font-weight: 800;
    margin-bottom: 5px;
  }

  .popup-subtitle {
    font-size: 12px;
    line-height: 1.35;
    opacity: 0.9;
  }

  .popup-body {
    padding: 16px 18px 18px;
  }

  .popup-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .popup-badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .badge-blue {
    background: #dbeafe;
    color: #1d4ed8;
  }

  .badge-muted {
    background: #f3f4f6;
    color: #6b7280;
  }

  .popup-info-grid {
    display: grid;
    gap: 10px;
  }

  .popup-info-grid div,
  .popup-linked-box,
  .popup-stat {
    border: 1px solid #e5e7eb;
    background: #f9fafb;
    border-radius: 12px;
    padding: 10px 11px;
  }

  .popup-info-grid span,
  .popup-linked-box span,
  .popup-stat span {
    display: block;
    color: #6b7280;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .popup-info-grid strong,
  .popup-linked-box strong,
  .popup-stat strong {
    display: block;
    color: #111827;
    font-size: 13px;
    line-height: 1.35;
  }

  .popup-stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    margin-bottom: 10px;
  }

  .popup-stat strong {
    font-size: 18px;
    font-family: Syne, Inter, Arial, sans-serif;
  }

  .popup-linked-box {
    margin-bottom: 11px;
  }

  .popup-note {
    margin: 0;
    color: #6b7280;
    font-size: 11px;
    line-height: 1.55;
  }

  .featured-callout {
    border-radius: 12px;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    color: #9a3412;
    padding: 10px 11px;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 10px;
  }

  .map-legend-card {
    position: fixed;
    top: 10px;
    left: 50px;
    z-index: 9999;
    background: white;
    padding: 14px 16px;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    font-family: Inter, Arial, sans-serif;
    font-size: 13px;
    max-width: 390px;
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
    color: #1f2937;
  }

  .map-legend-card b {
    display: block;
    font-family: Syne, Inter, Arial, sans-serif;
    font-size: 15px;
    margin-bottom: 6px;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    color: #4b5563;
  }

  .legend-dot-blue {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
  }

  .legend-dot-orange {
    width: 12px;
    height: 12px;
    border-radius: 50% 50% 50% 3px;
    transform: rotate(-45deg);
    background: #f97316;
    box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.16);
  }

  .legend-line {
    width: 18px;
    height: 0;
    border-top: 2px dashed #9ca3af;
  }
